name: Backend Deploy

#on:
#  push:
#    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Grant Gradle execute permission
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew clean build -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t backend:${{ github.sha }} .
          docker tag backend:${{ github.sha }} ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Prepare deploy bundle
        run: |
          mkdir -p bundle
          cp -r appspec.yml scripts deploy docker-compose.yml bundle/
          cd bundle
          zip -r ../app.zip .

      - name: Upload to S3
        run: |
          aws s3 cp app.zip s3://${{ secrets.S3_BUCKET }}/app.zip

      - name: Trigger CodeDeploy
        run: |
          aws deploy create-deployment 
            --application-name ${{ secrets.CODEDEPLOY_APP }} 
            --deployment-group-name ${{ secrets.CODEDEPLOY_GROUP }} 
            --deployment-config-name CodeDeployDefault.AllAtOnce 
            --s3-location bucket=${{ secrets.S3_BUCKET }},key=app.zip,bundleType=zip
