version: 0.0
os: linux

files:
  - source: /
    destination: /opt/app

hooks:
  BeforeInstall:
    - location: scripts/stop.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: scripts/pull.sh
      timeout: 600
      runas: root

  ApplicationStart:
    - location: scripts/start.sh
      timeout: 600
      runas: root

  ValidateService:
    - location: scripts/healthcheck.sh
      timeout: 300
      runas: root
