spring:
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/waffle}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1676}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USERNAME:guest}
    password: ${RABBIT_PASSWORD:guest}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000
          max-interval: 10000
          multiplier: 2.0
          max-attempts: 5

mybatis:
  mapper-locations: classpath:/mapper/*.xml

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  invite:
    base-url: ${INVITE_BASE_URL:http://localhost:3000}
  recommendation:
    rabbit:
      exchange: ${RABBIT_EXCHANGE:exchange}
      queue: ${RABBIT_QUEUE:queue}
      routing-key: ${RABBIT_ROUTING_KEY:queue}
      dlx: ${RABBIT_DLX:deadExchange}
      dlq: ${RABBIT_DLQ:deadQueue}
      dlq-routing-key: ${RABBIT_DLQ_ROUTING_KEY:deadQueue}
    redis-channel: ${RECOMMENDATION_REDIS_CHANNEL:recommendation.result}
    websocket:
      allowed-origins: ${RECOMMENDATION_WS_ALLOWED_ORIGINS:*}
  worker:
    backpressure:
      enabled: ${APP_WORKER_BACKPRESSURE_ENABLED:true}
      check-interval-ms: ${APP_WORKER_BACKPRESSURE_CHECK_INTERVAL_MS:1000}
      listener-id: ${APP_WORKER_BACKPRESSURE_LISTENER_ID:userRecommendJobConsumer}
      pause-threshold: ${APP_WORKER_BACKPRESSURE_PAUSE_THRESHOLD:75.0}
      resume-threshold: ${APP_WORKER_BACKPRESSURE_RESUME_THRESHOLD:60.0}
      high-usage-threshold: ${APP_WORKER_BACKPRESSURE_HIGH_USAGE_THRESHOLD:65.0}
      normal-usage-threshold: ${APP_WORKER_BACKPRESSURE_NORMAL_USAGE_THRESHOLD:45.0}
      high-usage-concurrency: ${APP_WORKER_BACKPRESSURE_HIGH_USAGE_CONCURRENCY:12}
      normal-usage-concurrency: ${APP_WORKER_BACKPRESSURE_NORMAL_USAGE_CONCURRENCY:24}
      low-usage-concurrency: ${APP_WORKER_BACKPRESSURE_LOW_USAGE_CONCURRENCY:37}

file:
  uploadPath: ${FILE_UPLOAD_PATH:/app/uploads}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: waffle
