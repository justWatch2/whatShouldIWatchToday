version: "3.8"

services:
  backend-web:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: backend-web-local
    environment:
      - SPRING_PROFILES_ACTIVE=web
    env_file:
      - ./deploy/env/web.env.local
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - rabbitmq

  backend-worker:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: backend-worker-local
    environment:
      - SPRING_PROFILES_ACTIVE=worker
    env_file:
      - ./deploy/env/worker.env.local
    depends_on:
      - redis
      - rabbitmq

  redis:
    image: redis:7
    container_name: redis-local
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-local
    ports:
      - "5672:5672"
      - "15672:15672"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-local
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  influxdb:
    image: influxdb:1.8
    container_name: influxdb-local
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_HTTP_AUTH_ENABLED=false
    volumes:
      - influxdb-data:/var/lib/influxdb

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-local
    depends_on:
      - prometheus
      - influxdb
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_MIN_REFRESH_INTERVAL=1s
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro

networks:
  default:
    name: whatshouldiwatch-local

volumes:
  prometheus-data:
  influxdb-data:
  grafana-data:
